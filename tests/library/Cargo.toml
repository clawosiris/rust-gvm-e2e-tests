[package]
name = "gvm-community-e2e"
version = "0.1.0"
edition = "2021"
publish = false

[dependencies]
gvm-client = { git = "https://github.com/clawosiris/rust-gvm.git", branch = "main" }
gvm-connection = { git = "https://github.com/clawosiris/rust-gvm.git", branch = "main" }
gvm-gmp = { git = "https://github.com/clawosiris/rust-gvm.git", branch = "main" }
gvm-protocol = { git = "https://github.com/clawosiris/rust-gvm.git", branch = "main" }
quick-xml = "0.38"
thiserror = "2"
tokio = { version = "1", features = ["rt", "time"] }
