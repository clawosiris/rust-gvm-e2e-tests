name: E2E Tests

concurrency:
  group: e2e-tests-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

on:
  workflow_dispatch:
    inputs:
      run-scan:
        description: "Run extended scan test (slow, ~10min+)"
        required: false
        type: boolean
        default: false
      clean:
        description: "Destroy persistent volumes before starting (clean slate)"
        required: false
        type: boolean
        default: false
      rust-gvm-ref:
        description: "rust-gvm branch/tag/SHA to test against"
        required: false
        type: string
        default: "main"
      gvm-rools-ref:
        description: "gvm-rools branch/tag/SHA to test against"
        required: false
        type: string
        default: "main"
      gvm-version:
        description: "GVM stack image tag to test (for example stable, oldstable, edge, or a release tag)"
        required: false
        type: string
        default: "stable"
      validate-gvm-tools:
        description: "Validate results against gvm-tools (cross-check)"
        required: false
        type: boolean
        default: true
      run-differential:
        description: "Run cross-client differential suite (rust-gvm vs python-gvm)"
        required: false
        type: boolean
        default: false
  repository_dispatch:
    types: [component-updated]
  pull_request:
    branches: [main]
    paths:
      - 'tests/**'
      - 'docker/**'
      - '.github/workflows/e2e.yml'

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  COMPOSE_FILE: docker/docker-compose.yml
  RUNNER_IMAGE_NAME: rust-gvm-e2e-runner
  RUNNER_IMAGE_TAG: ci

jobs:
  build-runner:
    name: Build E2E Runner Image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      rust-gvm-ref: ${{ steps.refs.outputs.rust-gvm-ref }}
      gvm-rools-ref: ${{ steps.refs.outputs.gvm-rools-ref }}
      gvm-version: ${{ steps.refs.outputs['gvm-version'] }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
      - name: Resolve component refs
        id: refs
        run: |
          RUST_GVM_REF="main"
          GVM_ROOLS_REF="main"
          GVM_VERSION="stable"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RUST_GVM_REF="${{ inputs.rust-gvm-ref || 'main' }}"
            GVM_ROOLS_REF="${{ inputs.gvm-rools-ref || 'main' }}"
            GVM_VERSION="${{ inputs['gvm-version'] || 'stable' }}"
          elif [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            COMPONENT="${{ github.event.client_payload.component }}"
            REF="${{ github.event.client_payload.ref }}"
            PAYLOAD_GVM_VERSION="${{ github.event.client_payload['gvm-version'] }}"
            if [ "$COMPONENT" = "rust-gvm" ] && [ -n "$REF" ]; then
              RUST_GVM_REF="$REF"
            elif [ "$COMPONENT" = "gvm-rools" ] && [ -n "$REF" ]; then
              GVM_ROOLS_REF="$REF"
            fi
            if [ -n "$PAYLOAD_GVM_VERSION" ]; then
              GVM_VERSION="$PAYLOAD_GVM_VERSION"
            fi
          fi
          echo "rust-gvm-ref=$RUST_GVM_REF" >> "$GITHUB_OUTPUT"
          echo "gvm-rools-ref=$GVM_ROOLS_REF" >> "$GITHUB_OUTPUT"
          echo "gvm-version=$GVM_VERSION" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Build and export runner image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: docker/Dockerfile.runner
          tags: ${{ env.RUNNER_IMAGE_NAME }}:${{ env.RUNNER_IMAGE_TAG }}
          outputs: type=docker,dest=runner-image.tar
          build-args: |
            RUST_GVM_REF=${{ steps.refs.outputs.rust-gvm-ref }}
            GVM_ROOLS_REF=${{ steps.refs.outputs.gvm-rools-ref }}
          secrets: |
            github_token=${{ secrets.RELEASE_TOKEN }}
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: e2e-runner-image
          path: runner-image.tar
          retention-days: 1

  e2e:
    name: GVM Community E2E
    needs: build-runner
    runs-on: [self-hosted]
    timeout-minutes: 180
    env:
      GVM_VERSION: ${{ needs.build-runner.outputs['gvm-version'] }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
      - name: Log component refs under test
        run: |
          echo "rust-gvm ref: ${{ needs.build-runner.outputs.rust-gvm-ref }}"
          echo "gvm-rools ref: ${{ needs.build-runner.outputs.gvm-rools-ref }}"
          echo "GVM stack version: ${GVM_VERSION}"
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: e2e-runner-image
      - name: Load runner image
        run: docker load -i runner-image.tar && rm -f runner-image.tar
      - name: Clean volumes (if requested)
        if: ${{ inputs.clean == true }}
        run: docker compose -f ${{ env.COMPOSE_FILE }} down -v
      - name: Pull container images
        run: docker compose -f ${{ env.COMPOSE_FILE }} pull
      - name: Start GVM stack
        run: docker compose -f ${{ env.COMPOSE_FILE }} up -d
      - name: Wait for gvmd readiness
        run: bash docker/scripts/wait-ready.sh
        timeout-minutes: 150
      - name: Run smoke tests
        run: |
          docker compose -f ${{ env.COMPOSE_FILE }} --profile runner run \
            -e E2E_RUN_SCAN=${{ inputs.run-scan && '1' || '0' }} \
            --rm rust-gvm-e2e
      - name: Run CRUD tests
        if: success()
        run: |
          docker compose -f ${{ env.COMPOSE_FILE }} --profile runner run --rm -T \
            --entrypoint "" rust-gvm-e2e \
            gvm-community-e2e --suite crud
      - name: Run SecInfo tests
        if: success()
        run: |
          docker compose -f ${{ env.COMPOSE_FILE }} --profile runner run --rm -T \
            --entrypoint "" rust-gvm-e2e \
            gvm-community-e2e --suite secinfo
      - name: Run Differential tests
        if: success() && inputs.run-differential == true
        run: |
          docker compose -f ${{ env.COMPOSE_FILE }} --profile runner run --rm -T \
            --entrypoint "" rust-gvm-e2e \
            gvm-community-e2e --suite differential
      - name: Validate results with gvm-tools
        if: success() && inputs.validate-gvm-tools != false
        run: |
          echo "=== Cross-validating with gvm-tools ==="
          docker compose -f ${{ env.COMPOSE_FILE }} --profile runner run --rm -T --entrypoint "" rust-gvm-e2e \
            python3 /workspace/docker/scripts/validate-against-gvm-tools.py --check all
      - name: gvm-tools cross-check on failure
        if: failure()
        run: |
          docker compose -f ${{ env.COMPOSE_FILE }} --profile runner run --rm -T --entrypoint "" rust-gvm-e2e \
            python3 /workspace/docker/scripts/validate-against-gvm-tools.py --check all
      - name: Collect logs on failure
        if: failure()
        run: |
          docker compose -f ${{ env.COMPOSE_FILE }} logs --tail=200 gvmd
          docker compose -f ${{ env.COMPOSE_FILE }} logs --tail=50 ospd-openvas
          docker compose -f ${{ env.COMPOSE_FILE }} logs --tail=50 openvasd
          docker compose -f ${{ env.COMPOSE_FILE }} logs --tail=30 redis-server
          docker compose -f ${{ env.COMPOSE_FILE }} logs --tail=30 pg-gvm
      - name: Stop containers (keep volumes)
        if: always()
        run: docker compose -f ${{ env.COMPOSE_FILE }} down
